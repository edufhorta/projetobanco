<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concecionária</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <button onclick="window.location.href='/catalogo'">Voltar para Catálogo</button><br></br>
    <h1>Pedidos</h1>
    <div style="border-color: black; border-width: 2 px; border-style: solid; width: 65%">
    <ul id="lista_pedidos"></ul>
    </div>
    <br></br>
    <div style = "display: flex; flex-direction: row;gap: 50px;">
    <div>
    <h4>Fazer pedido</h4>
    <input type="text" id="input_pedido_carro" placeholder="Digite o nome do carro"> <br></br>
    <input type="text" id="input_pedido_quantidade" placeholder="Digite a quantidade"> <br></br>
    <input type="text" id="input_pedido_cidade" placeholder="Digite a cidade de entrega"> <br></br>
    <button style="padding: 10px;" id="fazer_pedido_btn">Fazer Pedido</button>
    </div>
    <div>
    <h4>Cancelar pedido</h4>
    <input type="text" id="input_cancelar_carro" placeholder="Digite numero do pedido"> <br></br>
    <button style="padding: 10px;" id="cancelar_pedido_btn">Cancelar Pedido</button>
    </div>
    <div>
        <h4>Atualizar pedido</h4>
        <input type="text" id="input_atualizar_pedido_id" placeholder="Digite numero do pedido"> <br></br>
        <button style="padding: 10px;" id="atualizar_pedido_btn">Concluir Pedido</button>
    </div>
    </div>
    <script src="/static/javascript.js"></script>
</body>
</html>
